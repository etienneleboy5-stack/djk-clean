name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer les dépendances système
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip \
            build-essential libffi-dev libssl-dev autoconf automake \
            libtool pkg-config cmake zlib1g-dev libncurses5-dev \
            libgdbm-dev libnss3-dev libreadline-dev libsqlite3-dev

      - name: Installer buildozer et les libs Python
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Compiler l'APK
        run: |
          yes | buildozer android debug

      - name: Publier l'APK compilé
        uses: actions/upload-artifact@v4
        with:
          name: djk-clean-apk
          path: bin/*.apk
